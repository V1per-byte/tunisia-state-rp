<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TUNISIA STATE ROLEPLAY - Sign In</title>
  <style>
    /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
    body, html { height: 100%; }

    /* Video Background */
    #bg-video {
      position: fixed;
      top: 0; left: 0; 
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
      filter: brightness(0.6); 
    }

    /* Overlay for luxury effect */
    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 0;
    }

    /* Center container */
    .container {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: #fff;
      text-align: center;
      padding: 20px;
    }

    /* Logo Styling */
    .logo img {
      width: 220px; 
      height: auto;
      margin-bottom: 25px;
      border-radius: 50%; 
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.5); 
    }

    /* Form styling */
    .signin-form, .welcome-box {
      background: rgba(0, 0, 0, 0.6); 
      border: 1px solid rgba(255, 0, 0, 0.3); 
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 15px;
      width: 350px;
      transition: all 0.5s ease;
    }

    .signin-form h2, .welcome-box h2 {
      margin-bottom: 20px;
      font-family: 'Verdana', sans-serif;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .signin-form input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      outline: none;
      font-size: 16px;
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    .signin-form input:focus {
      border-color: #ff0000; 
    }

    .signin-form input::placeholder {
      color: rgba(255,255,255,0.7);
    }

    /* Button aligned with server theme colors */
    .signin-form button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #b30000, #330000); 
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 4px 10px rgba(255, 0, 0, 0.3);
    }

    .signin-form button:hover {
      transform: scale(1.05);
      background: linear-gradient(90deg, #ff0000, #4d0000);
      box-shadow: 0 6px 15px rgba(255, 0, 0, 0.5);
    }

    .server-name {
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #ff0000;
      animation: glow 2s infinite alternate;
    }

    .welcome-text {
      font-size: 18px;
      color: #eceff1;
      line-height: 1.5;
    }

    /* إضافة تأثير بسيط عند تمرير الماوس فوق رابط التسجيل */
    .create-acc-link:hover {
      text-decoration: underline !important;
    }

    @keyframes glow {
      from {
        text-shadow: 0 0 10px #ff0000, 0 0 20px #000;
      }
      to {
        text-shadow: 0 0 20px #ff0000, 0 0 30px #ff4d4d, 0 0 40px #000;
      }
    }
  </style>
</head>
<body>

  <video autoplay muted loop id="bg-video">
    <source src="District 10 RZ - GTA V FiveM Loading Screen Cinematic.mp4" type="video/mp4">
    Your browser does not support HTML5 video.
  </video>

  <div class="overlay"></div>

  <audio autoplay loop>
    <source src="District 10 RZ - GTA V FiveM Loading Screen Cinematic.mp3" type="audio/mp3">
  </audio>

  <div class="container">
    <div class="server-name">TUNISIA STATE ROLEPLAY</div>
    
    <div class="logo">
      <img src="./logo.jpg.png" alt="Tunisia State Logo">
    </div>

    <div id="interface-wrapper">
      <form class="signin-form" id="loginForm">
        <h2>Sign In</h2>
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Enter</button>
        
        <p style="margin-top: 15px; color: rgba(255, 255, 255, 0.7); font-size: 14px;">
          Don't have an account? <a href="register.html" class="create-acc-link" style="color: #ff0000; text-decoration: none; font-weight: bold;">Create Account</a>
        </p>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(event) {
      event.preventDefault();

      const usernameValue = document.getElementById('username').value;
      console.log("Logged Username:", usernameValue);

      const wrapper = document.getElementById('interface-wrapper');
      
      // تم تعديل صندوق الترحيب ليصبح أكثر احترافية ويتناسق مع صندوق الـ register
      wrapper.innerHTML = `
        <div class="welcome-box">
          <h2>Welcome, ${usernameValue}!</h2>
          <p class="welcome-text">Authentication successful.<br>Connecting to Tunisia State Roleplay server...</p>
        </div>
      `;
    });
  </script>

</body>
</html>
